kind = "web"
previewPath = "/"
title = "Discord Bot Customizer"
version = "1.0.0"
id = "artifacts/discord-bot-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22117

[services.development]
run = "pnpm --filter @workspace/discord-bot-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-bot-dashboard", "run", "build" ]
publicDir = "artifacts/discord-bot-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22117"
BASE_PATH = "/"
